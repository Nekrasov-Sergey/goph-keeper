services:
  goph-keeper:
    container_name: postgres
    image: bitnami/postgresql:latest
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/bitnami/postgresql
    restart: always

volumes:
  postgres_data:
