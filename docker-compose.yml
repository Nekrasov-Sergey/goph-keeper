services:
  goph-keeper:
    container_name: postgres
    image: bitnami/postgresql:17.5.0-debian-12-r20
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/bitnami/postgresql

volumes:
  postgres_data:
